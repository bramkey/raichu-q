  <script>
    const SUPABASE_URL = "https://ncqcqtfnaamcrbhncocv.supabase.co";
    const SUPABASE_KEY = "sb_publishable_0XjUw1Y6h99mUso6uJT_uw_dt8sFSHh";

    if (!window.supabase) {
      console.error("Supabase library failed to load.");
    }

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // required Supabase table:
    // public.activity_log
    // columns:
    // id bigint generated always as identity primary key
    // title text not null
    // item_type text not null
    // event_type text not null
    // rating integer null
    // message text not null
    // created_at timestamptz not null default now()


    let movies = [];
    let games = [];
    let searchTerm = "";
    let statusFilter = "all";
    let moviePage = 1;
    let gamePage = 1;
    const ITEMS_PER_PAGE = 5;

    function renderLog() {
      const logBox = document.getElementById("logBox");
      if (!logBox) return;

      if (activityLog.length === 0) {
        logBox.innerHTML = '<div class="log-entry" style="opacity:0.6;">nothing new added yet :(</div>';
        return;

      logBox.innerHTML = activityLog
        .map(entry => `<div class="log-entry">${entry.message || entry}</div>`)
        .join("");

    async function loadActivityLog() {
      const { data, error } = await supabaseClient
        .from("activity_log")
        .select("message, created_at")
        .order("created_at", { ascending: false })
        .limit(5);

      if (error) {
        console.error("Error loading activity log:", error);
        renderLog();
        return;
      }

      activityLog = data || [];
      renderLog();
    }

    async function saveActivityLog({ title, itemType, eventType, rating = null }) {
      if (!title) return false;

      const dateOnly = new Date().toLocaleDateString();
      let message = "";

      if (eventType === "added") {
        message = `added "${escapeHtml(title)}" in ${itemType === "game" ? "games" : "watchlist"} • ${dateOnly}`;
      } else if (eventType === "rated") {
        message = `"${escapeHtml(title)}" on ${itemType === "game" ? "games" : "watchlist"} was rated ${rating} star${rating === 1 ? "" : "s"} • ${dateOnly}`;
      }

      const { error } = await supabaseClient
        .from("activity_log")
        .insert([{
          title,
          item_type: itemType,
          event_type: eventType,
          rating,
          message
        }]);

      if (error) {
        console.error("Error saving activity log:", error);
        return false;
      }

      return true;
    }


    function getStatusClass(status) {
      if (status === "want to watch" || status === "want to play") return "status-want";
      if (status === "in progress" || status === "currently playing") return "status-progress";
      return "status-finished";
    }

    function isFinishedStatus(status) {
      return status === "finished";
    }

    function sortQueue(items) {
      return [...items].sort((a, b) => {
        const aPriority = a.priority ? 1 : 0;
        const bPriority = b.priority ? 1 : 0;
        if (aPriority !== bPriority) return bPriority - aPriority;
        const aFinished = isFinishedStatus(a.status) ? 1 : 0;
        const bFinished = isFinishedStatus(b.status) ? 1 : 0;

        if (aFinished !== bFinished) {
          return aFinished - bFinished;
        }

        return new Date(b.created_at) - new Date(a.created_at);
      });
    }

    function getBorderClass(status) {
      if (status === "finished") return "status-finished-border";
      if (status === "in progress" || status === "currently playing") return "status-progress-border";
      return "status-want-border";
    }

    function createItemHTML(item, index, type) {
      const options = type === "game"
        ? `
          <option value="want to play" ${item.status === "want to play" ? "selected" : ""}>want to play</option>
          <option value="currently playing" ${item.status === "currently playing" ? "selected" : ""}>currently playing</option>
          <option value="finished" ${item.status === "finished" ? "selected" : ""}>finished</option>
        `
        : `
          <option value="want to watch" ${item.status === "want to watch" ? "selected" : ""}>want to watch</option>
          <option value="in progress" ${item.status === "in progress" ? "selected" : ""}>in progress</option>
          <option value="finished" ${item.status === "finished" ? "selected" : ""}>finished</option>
        `;

      const finishedClass = item.status === "finished" ? "finished-item" : "";
      const finishedBadge = item.status === "finished"
        ? '<span class="finished-badge">Finished ✓</span>'
        : "";
      const hasSummary = item.description && item.description.trim();
      const editorValue = item.description ? escapeAttribute(item.description) : "";
      const ratingHTML = item.status === "finished"
        ? `
          <div class="rating-row">
            <div class="star-rating" aria-label="rating">
              ${[1,2,3,4,5].map(star => `
                <button
                  type="button"
                  class="star-btn ${item.rating >= star ? "active" : ""}"
                  onclick="updateRating('${type}', ${index}, ${star})"
                  aria-label="rate ${star} stars"
                >★</button>
              `).join("")}
            </div>
          </div>
        `
        : "";

      return `
        <div class="item ${finishedClass} ${getBorderClass(item.status)}">
          <div class="item-top">
            <div class="title">
              <button type="button" class="title-button" onclick="toggleTitleEditor('${type}', ${index})" aria-label="edit title for ${escapeHtml(item.title)}">
                <span class="title-text">${escapeHtml(item.title)}</span>
              </button>
              ${finishedBadge}
            </div>
            <div class="controls">
              <button class="priority-toggle ${item.priority ? "active" : ""}" onclick="togglePriority(\'${type}\', ${index}, ${item.priority ? "false" : "true"})">${item.priority ? "★" : "☆"}</button>
              <select class="${getStatusClass(item.status)}" onchange="updateStatus('${type}', ${index}, this)">
                ${options}
              </select>
              <button class="delete-btn" onclick="removeItem('${type}', ${index})">✕</button>
            </div>
          </div>


          <div class="title-editor" id="${type}-title-editor-${index}">
            <input
              type="text"
              id="${type}-title-input-${index}"
              value="${escapeAttribute(item.title)}"
              placeholder="edit title"
              onkeydown="handleTitleEditKey(event, '${type}', ${index})"
            />
            <div class="item-actions">
              <button onclick="saveTitle('${type}', ${index})">save title</button>
              <button class="secondary-btn" onclick="toggleTitleEditor('${type}', ${index})">cancel</button>
            </div>
          </div>

          <div class="summary-row">
            ${hasSummary ? `
              <div class="summary-text" id="${type}-summary-${index}">${escapeHtml(item.description)}</div>
              <div class="summary-bottom">
                <button class="summary-link" onclick="toggleSummaryEditor('${type}', ${index})">edit summary</button>

                ${item.status === "finished" ? `
                  <div class="rating-row">
                    <div class="star-rating" aria-label="rating">
                      ${[1,2,3,4,5].map(star => `
                        <button
                          type="button"
                          class="star-btn ${item.rating >= star ? "active" : ""}"
                          onclick="updateRating('${type}', ${index}, ${star})"
                          aria-label="rate ${star} stars"
                        >★</button>
                      `).join("")}
                    </div>
                  </div>
                ` : ""}
              </div>
            ` : `
              <div class="summary-bottom">
                <button class="summary-link" onclick="toggleSummaryEditor('${type}', ${index})">add summary</button>

                ${item.status === "finished" ? `
                  <div class="rating-row">
                    <div class="star-rating" aria-label="rating">
                      ${[1,2,3,4,5].map(star => `
                        <button
                          type="button"
                          class="star-btn ${item.rating >= star ? "active" : ""}"
                          onclick="updateRating('${type}', ${index}, ${star})"
                          aria-label="rate ${star} stars"
                        >★</button>
                      `).join("")}
                    </div>
                  </div>
                ` : ""}
              </div>
            `}
          </div>

          <div class="summary-editor" id="${type}-editor-${index}">
            <textarea id="${type}-editor-input-${index}" placeholder="write a short summary or notes here.">${editorValue}</textarea>
            <div class="item-actions">
              <button onclick="saveSummary('${type}', ${index})">save summary</button>
              <button class="secondary-btn" onclick="toggleSummaryEditor('${type}', ${index})">cancel</button>
            </div>
          </div>
        </div>
      `;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function escapeAttribute(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function filterItems(items) {
      return items.filter(item => {
        const title = String(item.title || "").toLowerCase();
        const description = String(item.description || "").toLowerCase();
        const status = String(item.status || "").toLowerCase();

        const matchesSearch =
          !searchTerm ||
          title.includes(searchTerm) ||
          description.includes(searchTerm);

        let matchesStatus = true;
        if (statusFilter === "finished") {
          matchesStatus = status === "finished";
        } else if (statusFilter === "in progress") {
          matchesStatus = status === "in progress" || status === "currently playing";
        } else if (statusFilter === "want") {
          matchesStatus = status === "want to watch" || status === "want to play";
        }

        return matchesSearch && matchesStatus;
      });
    }


    function paginateItems(items, page) {
      const totalPages = Math.max(1, Math.ceil(items.length / ITEMS_PER_PAGE));
      const safePage = Math.min(page, totalPages);
      const start = (safePage - 1) * ITEMS_PER_PAGE;
      return {
        pageItems: items.slice(start, start + ITEMS_PER_PAGE),
        totalPages,
        currentPage: safePage
      };
    }

    function renderPagination(type, currentPage, totalPages) {
      const paginationEl = document.getElementById(type === "movie" ? "moviePagination" : "gamePagination");
      if (!paginationEl) return;

      if (totalPages <= 1) {
        paginationEl.innerHTML = "";
        return;
      }

      paginationEl.innerHTML = `
        <button class="page-btn secondary-btn" ${currentPage === 1 ? "disabled" : ""} onclick="changePage('${type}', -1)">prev</button>
        <span class="page-info">page ${currentPage} of ${totalPages}</span>
        <button class="page-btn secondary-btn" ${currentPage === totalPages ? "disabled" : ""} onclick="changePage('${type}', 1)">next</button>
      `;
    }

    function render() {
      const movieList = document.getElementById("movieList");
      const gameList = document.getElementById("gameList");

      const filteredMovies = filterItems(sortQueue(movies));
      const filteredGames = filterItems(sortQueue(games));

      const movieData = paginateItems(filteredMovies, moviePage);
      const gameData = paginateItems(filteredGames, gamePage);

      moviePage = movieData.currentPage;
      gamePage = gameData.currentPage;

      movieList.innerHTML = movieData.pageItems.length
        ? movieData.pageItems.map((item) => createItemHTML(item, movies.findIndex(m => m.id === item.id), "movie")).join("")
        : `<div class="empty">no matching movies found ✨</div>`;

      gameList.innerHTML = gameData.pageItems.length
        ? gameData.pageItems.map((item) => createItemHTML(item, games.findIndex(g => g.id === item.id), "game")).join("")
        : `<div class="empty">no matching games found 🎮</div>`;

      renderPagination("movie", movieData.currentPage, movieData.totalPages);
      renderPagination("game", gameData.currentPage, gameData.totalPages);
      updateStats();
    }

    function changePage(type, direction) {
      if (type === "movie") {
        moviePage += direction;
      } else {
        gamePage += direction;
      }
      render(); updateStats();
    }

    async function loadItems() {
      const { data, error } = await supabaseClient
        .from("queue_items")
        .select("*");

      if (error) {
        console.error("Load error:", error);
        return;
      }

      movies = data.filter(item => item.type === "movie");
      games = data.filter(item => item.type === "game");
      render(); updateStats();
    }

    async function addItem() {
      const titleInput = document.getElementById("titleInput");
      const typeInput = document.getElementById("typeInput");
      const descriptionInput = document.getElementById("descriptionInput");
      const title = titleInput.value.trim();
      const type = typeInput.value;
      const description = descriptionInput.value.trim();

      if (!title) return;

      const normalizedTitle = title.toLowerCase();

      const alreadyExists =
        movies.some(item => item.title.toLowerCase() === normalizedTitle) ||
        games.some(item => item.title.toLowerCase() === normalizedTitle);

      if (alreadyExists) {
        alert("⚠️ that's already in your queue!");
        return;
      }

      const defaultStatus = type === "game" ? "want to play" : "want to watch";

      const { error } = await supabaseClient
        .from("queue_items")
        .insert([{ title, type, status: defaultStatus, description }]);

      if (error) {
        console.error("Insert error:", error);
        return;
      }

      titleInput.value = "";
      descriptionInput.value = "";
      document.getElementById("descriptionBox").classList.remove("show");
      document.getElementById("toggleDescriptionBtn").textContent = "add summary";
      await loadItems();
      await saveActivityLog({ title, itemType: type, eventType: "added" });
      await loadActivityLog();
      showRaichuMessage("good choice! ⚡");
    }

    async function updateStatus(type, index, selectElement) {
      const status = selectElement.value;
      const item = type === "movie" ? movies[index] : games[index];

      const { error } = await supabaseClient
        .from("queue_items")
        .update({ status })
        .eq("id", item.id);

      if (error) {
        console.error("Update error:", error);
        return;
      }

      selectElement.className = getStatusClass(status);
      await loadItems();

      if (status === "finished") {
        showRaichuMessage("was it any good?");
      }
    }

    async function removeItem(type, index) {
      const item = type === "movie" ? movies[index] : games[index];

      const confirmed = window.confirm(`are you sure you want to delete "${item.title}"?`);
      if (!confirmed) return;

      const { error } = await supabaseClient
        .from("queue_items")
        .delete()
        .eq("id", item.id);

      if (error) {
        console.error("Delete error:", error);
        return;
      }

      await loadItems();
    }

    function toggleSummaryEditor(type, index) {
      const el = document.getElementById(`${type}-editor-${index}`);
      if (!el) return;
      el.classList.toggle("show");
    }

    function toggleTitleEditor(type, index) {
      const el = document.getElementById(`${type}-title-editor-${index}`);
      const input = document.getElementById(`${type}-title-input-${index}`);
      const item = type === "movie" ? movies[index] : games[index];
      if (!el || !input || !item) return;

      const willShow = !el.classList.contains("show");
      el.classList.toggle("show");

      if (willShow) {
        input.value = item.title || "";
        requestAnimationFrame(() => {
          input.focus();
          input.select();
        });
      }
    }

    function handleTitleEditKey(event, type, index) {
      if (event.key === "Enter") {
        event.preventDefault();
        saveTitle(type, index);
      } else if (event.key === "Escape") {
        event.preventDefault();
        toggleTitleEditor(type, index);
      }
    }

    async function saveTitle(type, index) {
      const item = type === "movie" ? movies[index] : games[index];
      const input = document.getElementById(`${type}-title-input-${index}`);
      if (!item || !input) return;

      const title = input.value.trim();
      if (!title) {
        alert("please enter a title.");
        return;
      }

      const normalizedTitle = title.toLowerCase();
      const duplicateExists = [...movies, ...games].some(queueItem =>
        queueItem.id !== item.id && String(queueItem.title || "").toLowerCase() === normalizedTitle
      );

      if (duplicateExists) {
        alert("⚠️ that's already in your queue!");
        return;
      }

      const { error } = await supabaseClient
        .from("queue_items")
        .update({ title })
        .eq("id", item.id);

      if (error) {
        console.error("Title update error:", error);
        return;
      }

      await loadItems();
    }

    async function saveSummary(type, index) {
      const item = type === "movie" ? movies[index] : games[index];
      const input = document.getElementById(`${type}-editor-input-${index}`);
      const description = input.value.trim();

      const { error } = await supabaseClient
        .from("queue_items")
        .update({ description })
        .eq("id", item.id);

      if (error) {
        console.error("Summary update error:", error);
        return;
      }

      await loadItems();
    }


    

    const raichuBubble = document.getElementById('raichuBubble');
    const raichuWrapper = document.querySelector('.raichu-wrapper');
    let raichuTemporaryMessage = false;

    if (raichuWrapper && raichuBubble) {
      raichuWrapper.addEventListener('mouseenter', () => {
        if (!raichuTemporaryMessage) {
          raichuBubble.textContent = raichuBubble.dataset.default || 'hi gf 💛';
          raichuBubble.classList.add('hover-show');
        }
      });

      raichuWrapper.addEventListener('mouseleave', () => {
        if (!raichuTemporaryMessage) {
          raichuBubble.classList.remove('hover-show');
          setTimeout(() => {
            if (!raichuBubble.classList.contains('hover-show') && !raichuBubble.classList.contains('show')) {
              raichuBubble.textContent = '';
            }
          }, 800);
        }
      });
    }

    function showRaichuMessage(text) {
      const bubble = document.getElementById('raichuBubble');
      if (!bubble) return;

      raichuTemporaryMessage = true;
      bubble.classList.remove('hover-show');
      bubble.textContent = text;
      bubble.classList.add('show');

      clearTimeout(window._raichuTimer);
      clearTimeout(window._raichuCleanupTimer);

      window._raichuTimer = setTimeout(() => {
        bubble.classList.remove('show');

        window._raichuCleanupTimer = setTimeout(() => {
          bubble.textContent = '';
          raichuTemporaryMessage = false;
        }, 800);
      }, 3600);
    }


    async function updateRating(type, index, value) {
      const item = type === "movie" ? movies[index] : games[index];
      const rating = Number(value);

      if (!item) return;

      const { error } = await supabaseClient
        .from("queue_items")
        .update({ rating })
        .eq("id", item.id);

      if (error) {
        console.error("Rating update error:", error);
        return;
      }

      await loadItems();

      if (item.status === "finished") {
        await saveActivityLog({
          title: item.title,
          itemType: type,
          eventType: "rated",
          rating
        });
        await loadActivityLog();
      }
    }

    async function togglePriority(type, index, value) {
  const item = type === "movie" ? movies[index] : games[index];
  const priority = value === true || value === "true";

  const { error } = await supabaseClient
    .from("queue_items")
    .update({ priority })
    .eq("id", item.id);

  if (error) {
    console.error("Priority update error:", error);
    return;
  }

  await loadItems();
}

function subscribeToChanges() {
      supabaseClient
        .channel("site-live-updates")
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "queue_items" },
          () => {
            loadItems();
          }
        )
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "activity_log" },
          () => {
            loadActivityLog();
          }
        )
        .subscribe();
    }

    function setActivityLogCollapsed(collapsed) {
      const sidebar = document.getElementById("logSidebar");
      const toggleBtn = document.getElementById("logToggleBtn");
      if (!sidebar || !toggleBtn) return;

      sidebar.classList.toggle("collapsed", collapsed);
      toggleBtn.textContent = collapsed ? "expand" : "collapse";
      toggleBtn.setAttribute("aria-expanded", String(!collapsed));
      localStorage.setItem("activityLogCollapsed", collapsed ? "true" : "false");
    }

    const logToggleBtn = document.getElementById("logToggleBtn");
    if (logToggleBtn) {
      const savedCollapsed = localStorage.getItem("activityLogCollapsed") === "true";
      setActivityLogCollapsed(savedCollapsed);
      logToggleBtn.addEventListener("click", () => {
        const sidebar = document.getElementById("logSidebar");
        setActivityLogCollapsed(!sidebar.classList.contains("collapsed"));
      });
    }

    document.getElementById("addButton").addEventListener("click", addItem);
    loadActivityLog();
    document.getElementById("searchInput").addEventListener("input", (event) => {
      searchTerm = event.target.value.trim().toLowerCase();
      moviePage = 1;
      gamePage = 1;
      render();
    });

    document.getElementById("statusFilter").addEventListener("change", (event) => {
      statusFilter = event.target.value;
      moviePage = 1;
      gamePage = 1;
      render();
    });


    const toggleDescriptionBtn = document.getElementById("toggleDescriptionBtn");
    const descriptionBox = document.getElementById("descriptionBox");

    if (toggleDescriptionBtn && descriptionBox) {
      toggleDescriptionBtn.addEventListener("click", () => {
        descriptionBox.classList.toggle("show");
        toggleDescriptionBtn.textContent =
          descriptionBox.classList.contains("show") ? "hide summary" : "add summary";
      });
    }

    window.updateStatus = updateStatus;
    window.removeItem = removeItem;
    window.toggleSummaryEditor = toggleSummaryEditor;
    window.toggleTitleEditor = toggleTitleEditor;
    window.handleTitleEditKey = handleTitleEditKey;
    window.saveTitle = saveTitle;
    window.saveSummary = saveSummary;
    window.updateRating = updateRating;
    window.togglePriority = togglePriority;
    window.changePage = changePage;

    loadItems();
    loadActivityLog();
    subscribeToChanges();
function updateStats(){
  const totalMovies = movies.length;
  const totalGames = games.length;
  const finishedMovies = movies.filter(i=>i.status==="finished").length;
  const finishedGames = games.filter(i=>i.status==="finished").length;
  document.getElementById("statsBar").innerText =
    `🎬 ${totalMovies} on our watchlist (${finishedMovies} finished)
🎮 ${totalGames} games to play (${finishedGames} finished)`;
}

updateStats();


window.addEventListener("load", () => {
  const bubble = document.getElementById("raichuBubble");
  if (!bubble) return;

  const defaultText = bubble.dataset.default || "hi gf 💛";

  // show welcome message
  bubble.textContent = "welcome back, i missed you! 💛";
  bubble.style.opacity = "1"; bubble.style.transform="translateY(0)";

  // hide without switching back immediately
  setTimeout(() => {
    bubble.style.opacity = ""; bubble.style.transform="";

    // only restore default AFTER fully hidden
    setTimeout(() => {
      bubble.textContent = defaultText;
    }, 800); // matches fade time
  }, 2500);
});



function showRaichuMessage(text) {
  const bubble = document.getElementById("raichuBubble");
  if (!bubble) return;
  bubble.textContent = text;
  bubble.style.opacity = "1";

  clearTimeout(window.raichuTimeout);
  window.raichuTimeout = setTimeout(() => {
    bubble.style.opacity = "0";
  }, 2000);
}

window.addEventListener("load", () => {
  showRaichuMessage("welcome back, i missed you!");
});

const originalAdd = window.addItem;
window.addItem = function(...args) {
  showRaichuMessage("good choice!");
  return originalAdd.apply(this, args);
};

const originalUpdateStatus = window.updateStatus;
window.updateStatus = function(...args) {
  const status = args[2];
  if (status === "finished") {
    showRaichuMessage("was it any good?");
  }
  return originalUpdateStatus.apply(this, args);
};
