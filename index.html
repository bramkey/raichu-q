<!doctype html>
<html lang="en">

    <style>
      /* ===== site-wide base styles + color/theme setup ===== */
      html,
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Poppins", Arial, sans-serif;
        color: #5e4730;
      }

      body {
        background: linear-gradient(to bottom, #f4efe4, #dfc38a);
        display: flex;
        flex-direction: column;
        text-transform: lowercase;
      }

      .container {
        max-width: 1100px;
        margin: 40px auto;
        margin-right: calc(
          50% - 550px + 210px
        ); /* shift left slightly for strip */
        padding: 25px;
        flex: 1 0 auto;
        width: 100%;
        box-sizing: border-box;
      }

      .header {
        text-align: center;
        background: #d7b46a;
        border: 4px solid #9b6f35;
        border-radius: 25px;
        padding: 20px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        margin-bottom: 25px;
      }

      .header h1 {
        margin: 0;
        font-size: 2.5rem;
      }

      .header p {
        margin-top: 8px;
        font-size: 1rem;
      }

      /* ===== top input area for adding new queue items ===== */
      .toolbar {
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin-bottom: 30px;
      }

      .search-box {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      #statusFilter {
        min-width: 170px;
        background: #fffdf5;
      }

      @media (max-width: 700px) {
        /* ===== main two-column layout for watchlist + games ===== */
      .lists {
          flex-direction: column;
        }
        .search-box {
          flex-direction: column;
        }

        #statusFilter {
          width: min(420px, 100%);
        }
      }

      .add-box {
        position: relative;
        background: #eee0bd;
        border: 3px solid #b88a44;
        border-radius: 20px;
        padding: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.06);
      }

      .description-box {
        width: 100%;
        display: none;
        justify-content: center;
      }

      .description-box.show {
        display: flex;
      }

      input,
      select,
      button,
      textarea {
        padding: 10px 12px;
        border-radius: 12px;
        border: 2px solid #9b6f35;
        font-size: 14px;
        font-family: inherit;
      }

      input,
      select,
      textarea {
        background: white;
      }

      textarea {
        width: min(520px, 100%);
        min-height: 58px;
        resize: vertical;
      }

      #searchInput {
        width: min(420px, 100%);
        border: 3px solid #b98b47;
        background: #fffdf5;
        font-weight: bold;
        transition: all 0.25s ease;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      }

      #searchInput:focus {
        transform: scale(1.015);
        box-shadow: 0 0 6px rgba(185, 139, 71, 0.28);
        border-color: #9f7340;
        outline: none;
      }

      #searchInput:not(:placeholder-shown) {
        animation: pulse 0.4s ease;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.02);
        }
        100% {
          transform: scale(1.015);
        }
      }

      button {
        background: #b98b47;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
        border: none;
      }

      button:hover {
        background: #9f7340;
        transform: scale(1.03);
      }

      .secondary-btn {
        background: #eadcb9;
        color: #7a5a34;
        border: 2px solid #9b6f35;
      }

      .secondary-btn:hover {
        background: #dcc38d;
      }

      .lists {
        display: flex;
        gap: 20px;
        align-items: stretch;
      }

      .section {
        background: #f3ead7;
        border: 3px solid #b88a44;
        border-radius: 22px;
        padding: 18px;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.06);

        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .section h2 {
        text-align: center;
        margin-top: 0;
        font-size: 1.5rem;
      }

      /* ===== individual queue card styling ===== */
      .item {
        position: relative;
        overflow: visible;
        background: white;
        border-left: 8px solid #c6a05b;
        border-radius: 16px;
        padding: 12px;
        margin-bottom: 12px;
        box-shadow: 0 1px 5px rgba(0, 0, 0, 0.06);
        transition:
          opacity 0.2s ease,
          transform 0.2s ease,
          background 0.2s ease;
      }

      .item-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .title {
        font-weight: bold;
        font-size: 1rem;
        word-break: break-word;
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .title-button {
        background: none;
        border: none;
        padding: 0;
        margin: 0;
        font: inherit;
        color: inherit;
        font-weight: inherit;
        text-align: left;
        cursor: pointer;
        box-shadow: none !important;
        transform: none !important;
        min-width: 0;
      }

      .title-button:hover {
        background: none !important;
        color: inherit;
        box-shadow: none !important;
        transform: none !important;
        text-decoration: underline;
      }

      .title-editor {
        margin-top: 10px;
        display: none;
        flex-direction: column;
        gap: 8px;
      }

      .title-editor.show {
        display: flex;
      }

      .title-editor input {
        width: 100%;
        box-sizing: border-box;
      }

      .controls {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
        align-items: center;
        flex-shrink: 0;
      }

      .item-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 10px;
      }

      .summary-row {
        margin-top: 8px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .summary-bottom {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 8px;
        flex-wrap: wrap;
        width: 100%;
      }

      .summary-text {
        padding: 10px 12px;

      .item-actions {

        .sidebar {

      /* right side background strip */
      body::after {
        content: "";
        position: fixed;
        top: 0;

      body::before {
        content: "";
        position: fixed;
        top: 0;
        right: 0;
        width: 420px;

      }
    </style>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Fredoka:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- activity log sidebar: shows latest actions and can be collapsed -->
    <div class="sidebar" id="logSidebar">
      <div class="sidebar-header">
        <h3>activity log ⚡</h3>
        <button
          type="button"
          class="log-toggle-btn"
          id="logToggleBtn"
          aria-expanded="true"
        >
          collapse
        </button>
      </div>
      <div id="logBox">
        <div class="log-entry" style="opacity: 0.6">
          nothing new added yet :(
        </div>
      </div>
    </div>

    <div class="container">
      <!-- main app area: header, stats, add form, search/filter, and both lists -->
      <div class="header">
        <h1>⚡ raichu queue ⚡</h1>
      </div>

      <div class="stats-bar" id="statsBar">
        ⚡ loading stats and petting the raichu ...
      </div>

      <div class="toolbar">
      <!-- add form: users create new movie/show or game entries here -->
        <div class="add-box">
          <div class="add-row">
            <input
              type="text"
              id="titleInput"
              placeholder="add a movie/show or game"
            />
          </div>

          <div class="add-row controls-row">
            <select id="typeInput">
              <option value="movie">movie/show</option>
              <option value="game">game</option>
            </select>
            <button
              type="button"
              class="secondary-btn"
              id="toggleDescriptionBtn"
            >
              add summary
            </button>
            <button id="addButton">add to queue ⚡</button>
          </div>

          <div class="description-box" id="descriptionBox">
            <textarea
              id="descriptionInput"
              placeholder="write a short summary or notes here."
            ></textarea>
          </div>
        </div>
      </div>

      <div class="queue-browser-box">
      <!-- browsing area: raichu message, search/filter controls, and both paginated lists -->
        <div class="raichu-container" id="raichu">
          <img src="raichu.ico" class="raichu-img" />
          <div class="raichu-bubble" id="raichuBubble" data-default="hi gf">
            hi gf
          </div>
        </div>
        <div class="search-box">
          <input
            type="text"
            id="searchInput"
            placeholder="⚡ search the queue"
          />
          <select id="statusFilter">
            <option value="all">all statuses</option>
            <option value="finished">finished</option>
            <option value="in progress">in progress / currently playing</option>
            <option value="want">want to watch / play</option>
          </select>
        </div>

        <div class="lists">
          <!-- left column: watchlist items -->
          <div class="section">
            <h2>🎬 watchlist</h2>
            <div id="movieList"></div>
            <div class="pagination" id="moviePagination"></div>
          </div>

          <!-- right column: game items -->
          <div class="section">
            <h2>🎮 games</h2>
            <div id="gameList"></div>
            <div class="pagination" id="gamePagination"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <script>
      // ===== data setup + shared state =====
      const SUPABASE_URL = "https://ncqcqtfnaamcrbhncocv.supabase.co";
      const SUPABASE_KEY = "sb_publishable_0XjUw1Y6h99mUso6uJT_uw_dt8sFSHh";

      if (!window.supabase) {
        console.error("Supabase library failed to load.");
      }

      const supabaseClient = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY,
      );

      // required Supabase table:
      // public.activity_log
      // columns:
      // id bigint generated always as identity primary key
      // title text not null
      // item_type text not null
      // event_type text not null
      // rating integer null
      // message text not null
      // created_at timestamptz not null default now()

      let movies = [];
      let games = [];
      let searchTerm = "";
      let statusFilter = "all";
      let moviePage = 1;
      let gamePage = 1;
      const ITEMS_PER_PAGE = 5;
      let activityLog = [];

      // keeps all stored/displayed text lowercase so the site stays visually consistent
      function toLowerSafe(value) {
        return String(value || "").toLowerCase();
      }

      function normalizeQueueItem(item) {
        if (!item) return item;
        return {
          ...item,
          title: toLowerSafe(item.title),
          description: toLowerSafe(item.description),
        };
      }

      function normalizeLogEntry(entry) {
        if (!entry) return entry;
        return {
          ...entry,
          message: toLowerSafe(entry.message),
        };
      }

      // updates the summary bar at the top with current totals and finished counts
      function updateStats() {
        const totalMovies = movies.length;
        const totalGames = games.length;
        const finishedMovies = movies.filter(
          (item) => item.status === "finished",
        ).length;
        const finishedGames = games.filter(
          (item) => item.status === "finished",
        ).length;
        document.getElementById("statsBar").innerText =
          `🎬 ${totalMovies} on our watchlist (${finishedMovies} finished)
🎮 ${totalGames} games to play (${finishedGames} finished)`;
      }

      // renders the activity log sidebar using the most recent saved log entries
      function renderLog() {
        const logBox = document.getElementById("logBox");
        if (!logBox) return;

        if (activityLog.length === 0) {
          logBox.innerHTML =
            '<div class="log-entry" style="opacity:0.6;">nothing new added yet :(</div>';
          return;
        }

        logBox.innerHTML = activityLog
          .map(
            (entry) => `<div class="log-entry">${entry.message || entry}</div>`,
          )
          .join("");
      }

      // pulls recent activity log entries from supabase when the page loads or refreshes
      async function loadActivityLog() {
        const { data, error } = await supabaseClient
          .from("activity_log")
          .select("message, created_at")
          .order("created_at", { ascending: false })
          .limit(5);

        if (error) {
          console.error("Error loading activity log:", error);
          renderLog();
          return;
        }

        activityLog = (data || []).map(normalizeLogEntry);
        renderLog();
      }

      // saves a human-readable activity message whenever users add, edit, rate, or remove items
      async function saveActivityLog({
        title,
        itemType,
        eventType,
        rating = null,
      }) {
        if (!title) return false;

        const normalizedTitle = toLowerSafe(title.trim());
        const dateOnly = new Date().toLocaleDateString();
        let message = "";

        if (eventType === "added") {
          message = `added "${escapeHtml(normalizedTitle)}" in ${itemType === "game" ? "games" : "watchlist"} • ${dateOnly}`;
        } else if (eventType === "rated") {
          message = `"${escapeHtml(normalizedTitle)}" on ${itemType === "game" ? "games" : "watchlist"} was rated ${rating} star${rating === 1 ? "" : "s"} • ${dateOnly}`;
        }

        message = toLowerSafe(message);

        const { error } = await supabaseClient.from("activity_log").insert([
          {
            title: normalizedTitle,
            item_type: itemType,
            event_type: eventType,
            rating,
            message,
          },
        ]);

        if (error) {
          console.error("Error saving activity log:", error);
          return false;
        }

        return true;
      }

      function getStatusClass(status) {
        if (status === "want to watch" || status === "want to play")
          return "status-want";
        if (status === "in progress" || status === "currently playing")
          return "status-progress";
        return "status-finished";
      }

      function isFinishedStatus(status) {
        return status === "finished";
      }

      function sortQueue(items) {
        return [...items].sort((a, b) => {
          const aPriority = a.priority ? 1 : 0;
          const bPriority = b.priority ? 1 : 0;
          if (aPriority !== bPriority) return bPriority - aPriority;
          const aFinished = isFinishedStatus(a.status) ? 1 : 0;
          const bFinished = isFinishedStatus(b.status) ? 1 : 0;

          if (aFinished !== bFinished) {
            return aFinished - bFinished;
          }

          return new Date(b.created_at) - new Date(a.created_at);
        });
      }

      function getBorderClass(status) {
        if (status === "finished") return "status-finished-border";
        if (status === "in progress" || status === "currently playing")
          return "status-progress-border";
        return "status-want-border";
      }

      // builds the html for one queue card, including status, rating, priority, and edit controls
      function createItemHTML(item, index, type) {
        const options =
          type === "game"
            ? `
          <option value="want to play" ${item.status === "want to play" ? "selected" : ""}>want to play</option>
          <option value="currently playing" ${item.status === "currently playing" ? "selected" : ""}>currently playing</option>
          <option value="finished" ${item.status === "finished" ? "selected" : ""}>finished</option>
        `
            : `
          <option value="want to watch" ${item.status === "want to watch" ? "selected" : ""}>want to watch</option>
          <option value="in progress" ${item.status === "in progress" ? "selected" : ""}>in progress</option>
          <option value="finished" ${item.status === "finished" ? "selected" : ""}>finished</option>
        `;

        const finishedClass = item.status === "finished" ? "finished-item" : "";
        const finishedBadge =
          item.status === "finished"
            ? '<span class="finished-badge">Finished ✓</span>'
            : "";
        const hasSummary = item.description && item.description.trim();
        const editorValue = item.description
          ? escapeAttribute(item.description)
          : "";
        const ratingHTML =
          item.status === "finished"
            ? `
          <div class="rating-row">
            <div class="star-rating" aria-label="rating">
              ${[1, 2, 3, 4, 5]
                .map(
                  (star) => `
                <button
                  type="button"
                  class="star-btn ${item.rating >= star ? "active" : ""}"
                  onclick="updateRating('${type}', ${index}, ${star})"
                  aria-label="rate ${star} stars"
                >★</button>
              `,
                )
                .join("")}
            </div>
          </div>
        `
            : "";

        return `
        <div class="item ${finishedClass} ${getBorderClass(item.status)}">
          <div class="item-top">
            <div class="title">
              <button type="button" class="title-button" onclick="toggleTitleEditor('${type}', ${index})" aria-label="edit title for ${escapeHtml(item.title)}">
                <span class="title-text">${escapeHtml(item.title)}</span>
              </button>
              ${finishedBadge}
            </div>
            <div class="controls">
              <button class="priority-toggle ${item.priority ? "active" : ""}" onclick="togglePriority(\'${type}\', ${index}, ${item.priority ? "false" : "true"})">${item.priority ? "★" : "☆"}</button>
              <select class="${getStatusClass(item.status)}" onchange="updateStatus('${type}', ${index}, this)">
                ${options}
              </select>
              <button class="delete-btn" onclick="removeItem('${type}', ${index})">✕</button>
            </div>
          </div>


          <div class="title-editor" id="${type}-title-editor-${index}">
            <input
              type="text"
              id="${type}-title-input-${index}"
              value="${escapeAttribute(item.title)}"
              placeholder="edit title"
              onkeydown="handleTitleEditKey(event, '${type}', ${index})"
            />
            <div class="item-actions">
              <button onclick="saveTitle('${type}', ${index})">save title</button>
              <button class="secondary-btn" onclick="toggleTitleEditor('${type}', ${index})">cancel</button>
            </div>
          </div>

          <div class="summary-row">
            ${
              hasSummary
                ? `
              <div class="summary-text" id="${type}-summary-${index}">${escapeHtml(item.description)}</div>
              <div class="summary-bottom">
                <button class="summary-link" onclick="toggleSummaryEditor('${type}', ${index})">edit summary</button>

                ${
                  item.status === "finished"
                    ? `
                  <div class="rating-row">
                    <div class="star-rating" aria-label="rating">
                      ${[1, 2, 3, 4, 5]
                        .map(
                          (star) => `
                        <button
                          type="button"
                          class="star-btn ${item.rating >= star ? "active" : ""}"
                          onclick="updateRating('${type}', ${index}, ${star})"
                          aria-label="rate ${star} stars"
                        >★</button>
                      `,
                        )
                        .join("")}
                    </div>
                  </div>
                `
                    : ""
                }
              </div>
            `
                : `
              <div class="summary-bottom">
                <button class="summary-link" onclick="toggleSummaryEditor('${type}', ${index})">add summary</button>

                ${
                  item.status === "finished"
                    ? `
                  <div class="rating-row">
                    <div class="star-rating" aria-label="rating">
                      ${[1, 2, 3, 4, 5]
                        .map(
                          (star) => `
                        <button
                          type="button"
                          class="star-btn ${item.rating >= star ? "active" : ""}"
                          onclick="updateRating('${type}', ${index}, ${star})"
                          aria-label="rate ${star} stars"
                        >★</button>
                      `,
                        )
                        .join("")}
                    </div>
                  </div>
                `
                    : ""
                }
              </div>
            `
            }
          </div>

          <div class="summary-editor" id="${type}-editor-${index}">
            <textarea id="${type}-editor-input-${index}" placeholder="write a short summary or notes here.">${editorValue}</textarea>
            <div class="item-actions">
              <button onclick="saveSummary('${type}', ${index})">save summary</button>
              <button class="secondary-btn" onclick="toggleSummaryEditor('${type}', ${index})">cancel</button>
            </div>
          </div>
        </div>
      `;
      }

      function escapeHtml(text) {
        return String(text)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function escapeAttribute(text) {
        return String(text)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      // applies the live search box and status dropdown to whichever list is being displayed
      function filterItems(items) {
        return items.filter((item) => {
          const title = String(item.title || "").toLowerCase();
          const description = String(item.description || "").toLowerCase();
          const status = String(item.status || "").toLowerCase();

          const matchesSearch =
            !searchTerm ||
            title.includes(searchTerm) ||
            description.includes(searchTerm);

          let matchesStatus = true;
          if (statusFilter === "finished") {
            matchesStatus = status === "finished";
          } else if (statusFilter === "in progress") {
            matchesStatus =
              status === "in progress" || status === "currently playing";
          } else if (statusFilter === "want") {
            matchesStatus =
              status === "want to watch" || status === "want to play";
          }

          return matchesSearch && matchesStatus;
        });
      }

      // splits long lists into pages so the ui stays compact and easier to scan
      function paginateItems(items, page) {
        const totalPages = Math.max(
          1,
          Math.ceil(items.length / ITEMS_PER_PAGE),
        );
        const safePage = Math.min(page, totalPages);
        const start = (safePage - 1) * ITEMS_PER_PAGE;
        return {
          pageItems: items.slice(start, start + ITEMS_PER_PAGE),
          totalPages,
          currentPage: safePage,
        };
      }

      // draws the prev/next controls for each list
      function renderPagination(type, currentPage, totalPages) {
        const paginationEl = document.getElementById(
          type === "movie" ? "moviePagination" : "gamePagination",
        );
        if (!paginationEl) return;

        if (totalPages <= 1) {
          paginationEl.innerHTML = "";
          return;
        }

        paginationEl.innerHTML = `
        <button class="page-btn secondary-btn" ${currentPage === 1 ? "disabled" : ""} onclick="changePage('${type}', -1)">prev</button>
        <span class="page-info">page ${currentPage} of ${totalPages}</span>
        <button class="page-btn secondary-btn" ${currentPage === totalPages ? "disabled" : ""} onclick="changePage('${type}', 1)">next</button>
      `;
      }

      // main render pipeline: sorts, filters, paginates, and redraws both lists + stats
      function render() {
        const movieList = document.getElementById("movieList");
        const gameList = document.getElementById("gameList");

        const filteredMovies = filterItems(sortQueue(movies));
        const filteredGames = filterItems(sortQueue(games));

        const movieData = paginateItems(filteredMovies, moviePage);
        const gameData = paginateItems(filteredGames, gamePage);

        moviePage = movieData.currentPage;
        gamePage = gameData.currentPage;

        movieList.innerHTML = movieData.pageItems.length
          ? movieData.pageItems
              .map((item) =>
                createItemHTML(
                  item,
                  movies.findIndex((m) => m.id === item.id),
                  "movie",
                ),
              )
              .join("")
          : `<div class="empty">no matching movies found ✨</div>`;

        gameList.innerHTML = gameData.pageItems.length
          ? gameData.pageItems
              .map((item) =>
                createItemHTML(
                  item,
                  games.findIndex((g) => g.id === item.id),
                  "game",
                ),
              )
              .join("")
          : `<div class="empty">no matching games found 🎮</div>`;

        renderPagination("movie", movieData.currentPage, movieData.totalPages);
        renderPagination("game", gameData.currentPage, gameData.totalPages);
        updateStats();
      }

      function changePage(type, direction) {
        if (type === "movie") {
          moviePage += direction;
        } else {
          gamePage += direction;
        }
        render();
        updateStats();
      }

      // loads queue items from supabase, normalizes them, and refreshes the whole interface
      async function loadItems() {
        const { data, error } = await supabaseClient
          .from("queue_items")
          .select("*");

        if (error) {
          console.error("Load error:", error);
          return;
        }

        const normalizedData = (data || []).map(normalizeQueueItem);
        movies = normalizedData.filter((item) => item.type === "movie");
        games = normalizedData.filter((item) => item.type === "game");
        render();
        updateStats();
      }

      // adds a new movie/show or game to the database, then refreshes the ui and activity log
      async function addItem() {
        const titleInput = document.getElementById("titleInput");
        const typeInput = document.getElementById("typeInput");
        const descriptionInput = document.getElementById("descriptionInput");
        const title = toLowerSafe(titleInput.value.trim());
        const type = typeInput.value;
        const description = toLowerSafe(descriptionInput.value.trim());

        if (!title) return;

        const normalizedTitle = title.toLowerCase();

        const alreadyExists =
          movies.some((item) => item.title.toLowerCase() === normalizedTitle) ||
          games.some((item) => item.title.toLowerCase() === normalizedTitle);

        if (alreadyExists) {
          alert("⚠️ that's already in your queue!");
          return;
        }

        const defaultStatus =
          type === "game" ? "want to play" : "want to watch";

        const { error } = await supabaseClient
          .from("queue_items")
          .insert([{ title, type, status: defaultStatus, description }]);

        if (error) {
          console.error("Insert error:", error);
          return;
        }

        titleInput.value = "";
        descriptionInput.value = "";
        document.getElementById("descriptionBox").classList.remove("show");
        document.getElementById("toggleDescriptionBtn").textContent =
          "add summary";
        await loadItems();
        await saveActivityLog({ title, itemType: type, eventType: "added" });
        await loadActivityLog();
        showRaichuMessage("good choice! ⚡");
      }

      // updates an item status (want, in progress, finished) and re-renders the card state
      async function updateStatus(type, index, selectElement) {
        const status = selectElement.value;
        const item = type === "movie" ? movies[index] : games[index];

        const { error } = await supabaseClient
          .from("queue_items")
          .update({ status })
          .eq("id", item.id);

        if (error) {
          console.error("Update error:", error);
          return;
        }

        selectElement.className = getStatusClass(status);
        await loadItems();

        if (status === "finished") {
          showRaichuMessage("was it any good?");
        }
      }

      // deletes an item from the queue and records that action in the activity log
      async function removeItem(type, index) {
        const item = type === "movie" ? movies[index] : games[index];

        const confirmed = window.confirm(
          `are you sure you want to delete "${item.title}"?`,
        );
        if (!confirmed) return;

        const { error } = await supabaseClient
          .from("queue_items")
          .delete()
          .eq("id", item.id);

        if (error) {
          console.error("Delete error:", error);
          return;
        }

        await loadItems();
      }

      // shows or hides the inline summary editor for a single card
      function toggleSummaryEditor(type, index) {
        const el = document.getElementById(`${type}-editor-${index}`);
        if (!el) return;
        el.classList.toggle("show");
      }

      // opens or closes the inline title editor when a user clicks an item name
      function toggleTitleEditor(type, index) {
        const el = document.getElementById(`${type}-title-editor-${index}`);
        const input = document.getElementById(`${type}-title-input-${index}`);
        const item = type === "movie" ? movies[index] : games[index];
        if (!el || !input || !item) return;

        const willShow = !el.classList.contains("show");
        el.classList.toggle("show");

        if (willShow) {
          input.value = item.title || "";
          requestAnimationFrame(() => {
            input.focus();
            input.select();
          });
        }
      }

      function handleTitleEditKey(event, type, index) {
        if (event.key === "Enter") {
          event.preventDefault();
          saveTitle(type, index);
        } else if (event.key === "Escape") {
          event.preventDefault();
          toggleTitleEditor(type, index);
        }
      }

      // saves a renamed title back to supabase and updates the activity log
      async function saveTitle(type, index) {
        const item = type === "movie" ? movies[index] : games[index];
        const input = document.getElementById(`${type}-title-input-${index}`);
        if (!item || !input) return;

        const title = toLowerSafe(input.value.trim());
        if (!title) {
          alert("please enter a title.");
          return;
        }

        const normalizedTitle = title.toLowerCase();
        const duplicateExists = [...movies, ...games].some(
          (queueItem) =>
            queueItem.id !== item.id &&
            String(queueItem.title || "").toLowerCase() === normalizedTitle,
        );

        if (duplicateExists) {
          alert("⚠️ that's already in your queue!");
          return;
        }

        const { error } = await supabaseClient
          .from("queue_items")
          .update({ title })
          .eq("id", item.id);

        if (error) {
          console.error("Title update error:", error);
          return;
        }

        await loadItems();
      }

      // saves the edited summary/notes text for a queue item
      async function saveSummary(type, index) {
        const item = type === "movie" ? movies[index] : games[index];
        const input = document.getElementById(`${type}-editor-input-${index}`);
        const description = toLowerSafe(input.value.trim());

        const { error } = await supabaseClient
          .from("queue_items")
          .update({ description })
          .eq("id", item.id);

        if (error) {
          console.error("Summary update error:", error);
          return;
        }

        await loadItems();
      }
      // handles raichu speech bubble popups for friendly feedback after user actions
      function showRaichuMessage(text) {
        const bubble = document.getElementById("raichuBubble");
        if (!bubble) return;

        const defaultText = bubble.dataset.default || "hi gf";
        bubble.textContent = text;
        bubble.style.opacity = "1";
        bubble.style.transform = "translateY(0)";

        clearTimeout(window.raichuTimeout);
        window.raichuTimeout = setTimeout(() => {
          bubble.style.opacity = "";
          bubble.style.transform = "";
          setTimeout(() => {
            bubble.textContent = defaultText;
          }, 350);
        }, 2200);
      }

      // updates the saved star rating for an item and refreshes the list
      async function updateRating(type, index, value) {
        const item = type === "movie" ? movies[index] : games[index];
        const rating = Number(value);

        if (!item) return;

        const { error } = await supabaseClient
          .from("queue_items")
          .update({ rating })
          .eq("id", item.id);

        if (error) {
          console.error("Rating update error:", error);
          return;
        }

        await loadItems();

        if (item.status === "finished") {
          await saveActivityLog({
            title: item.title,
            itemType: type,
            eventType: "rated",
            rating,
          });
          await loadActivityLog();
        }
      }

      // toggles the priority star so users can mark favorites or higher-priority items
      async function togglePriority(type, index, value) {
        const item = type === "movie" ? movies[index] : games[index];
        const priority = value === true || value === "true";

        const { error } = await supabaseClient
          .from("queue_items")
          .update({ priority })
          .eq("id", item.id);

        if (error) {
          console.error("Priority update error:", error);
          return;
        }

        await loadItems();
      }

      // listens for realtime supabase updates so the page stays in sync after changes
      function subscribeToChanges() {
        supabaseClient
          .channel("site-live-updates")
          .on(
            "postgres_changes",
            { event: "*", schema: "public", table: "queue_items" },
            () => {
              loadItems();
            },
          )
          .on(
            "postgres_changes",
            { event: "*", schema: "public", table: "activity_log" },
            () => {
              loadActivityLog();
            },
          )
          .subscribe();
      }

      // collapses or expands the activity log and remembers the choice with localStorage
      function setActivityLogCollapsed(collapsed) {
        const sidebar = document.getElementById("logSidebar");
        const toggleBtn = document.getElementById("logToggleBtn");
        if (!sidebar || !toggleBtn) return;

        sidebar.classList.toggle("collapsed", collapsed);
        toggleBtn.textContent = collapsed ? "expand" : "collapse";
        toggleBtn.setAttribute("aria-expanded", String(!collapsed));
        localStorage.setItem(
          "activityLogCollapsed",
          collapsed ? "true" : "false",
        );
      }

      const logToggleBtn = document.getElementById("logToggleBtn");
      if (logToggleBtn) {
        const savedCollapsed =
          localStorage.getItem("activityLogCollapsed") === "true";
        setActivityLogCollapsed(savedCollapsed);
        logToggleBtn.addEventListener("click", () => {
          const sidebar = document.getElementById("logSidebar");
          setActivityLogCollapsed(!sidebar.classList.contains("collapsed"));
        });
      }

      // ===== startup event listeners + initial page load =====
      document.getElementById("addButton").addEventListener("click", addItem);
      loadActivityLog();
      document
        .getElementById("searchInput")
        .addEventListener("input", (event) => {
          searchTerm = event.target.value.trim().toLowerCase();
          moviePage = 1;
          gamePage = 1;
          render();
        });

      document
        .getElementById("statusFilter")
        .addEventListener("change", (event) => {
          statusFilter = event.target.value;
          moviePage = 1;
          gamePage = 1;
          render();
        });

      const toggleDescriptionBtn = document.getElementById(
        "toggleDescriptionBtn",
      );
      const descriptionBox = document.getElementById("descriptionBox");

      if (toggleDescriptionBtn && descriptionBox) {
        toggleDescriptionBtn.addEventListener("click", () => {
          descriptionBox.classList.toggle("show");
          toggleDescriptionBtn.textContent = descriptionBox.classList.contains(
            "show",
          )
            ? "hide summary"
            : "add summary";
        });
      }

      window.updateStatus = updateStatus;
      window.removeItem = removeItem;
      window.toggleSummaryEditor = toggleSummaryEditor;
      window.toggleTitleEditor = toggleTitleEditor;
      window.handleTitleEditKey = handleTitleEditKey;
      window.saveTitle = saveTitle;
      window.saveSummary = saveSummary;
      window.updateRating = updateRating;
      window.togglePriority = togglePriority;
      window.changePage = changePage;

      loadItems();
      loadActivityLog();
      subscribeToChanges();
    </script>
    <footer class="footer">made with love for my gf 💛</footer>
  </body>
</html>
