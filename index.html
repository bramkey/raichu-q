<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="raichu.ico">
  <title>raichu queue ⚡</title>
  <style>
    html, html, body {
  margin: 0;
  min-height: 100vh;
  font-family: "Poppins", Arial, sans-serif;
  background: inherit;
  color: #5e4730;
  display: flex;
  flex-direction: column;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: "Poppins", Arial, sans-serif;
  background: linear-gradient(to bottom, #f4efe4, #dfc38a);
  color: #5e4730;
  display: flex;
  flex-direction: column;
}

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Poppins", Arial, sans-serif;
      background: linear-gradient(to bottom, #f4efe4, #dfc38a);
      color: #5e4730;
      display: flex;
      flex-direction: column;
    }

    .container {
  max-width: 900px;
  margin: 40px auto;
  padding: 25px;
  flex: 1 0 auto;
  width: 100%;
  box-sizing: border-box;
}

    .header {
      text-align: center;
      background: #d7b46a;
      border: 4px solid #9b6f35;
      border-radius: 25px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.10);
      margin-bottom: 25px;
    }

    .header h1 {
      margin: 0;
      font-size: 2.5rem;
    }

    .header p {
      margin-top: 8px;
      font-size: 1rem;
    }

    .toolbar {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 30px;
    }

    .search-box {
      display: flex;
      justify-content: center;
    }

    .add-box {
      background: #eee0bd;
      border: 3px solid #b88a44;
      border-radius: 20px;
      padding: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      box-shadow: 0 3px 8px rgba(0,0,0,0.06);
    }

    .description-box {
      width: 100%;
      display: none;
      justify-content: center;
    }

    .description-box.show {
      display: flex;
    }

    input, select, button, textarea {

      padding: 10px 12px;
      border-radius: 12px;
      border: 2px solid #9b6f35;
      font-size: 14px;
      font-family: inherit;
    }

    input, select, textarea {
      background: white;
    }

    textarea {
      width: min(520px, 100%);
      min-height: 58px;
      resize: vertical;
    }

    #searchInput {
      width: min(420px, 100%);
      border: 3px solid #b98b47;
      background: #fffdf5;
      font-weight: bold;
      transition: all 0.25s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    #searchInput:focus {
      transform: scale(1.015);
      box-shadow: 0 0 6px rgba(185, 139, 71, 0.28);
      border-color: #9f7340;
      outline: none;
    }

    #searchInput:not(:placeholder-shown) {
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1.015); }
    }

    button {
      background: #b98b47;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      border: none;
    }

    button:hover {
      background: #9f7340;
      transform: scale(1.03);
    }

    .secondary-btn {
      background: #eadcb9;
      color: #7a5a34;
      border: 2px solid #9b6f35;
    }

    .secondary-btn:hover {
      background: #dcc38d;
    }

    .lists {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }

    .section {
      background: #f3ead7;
      border: 3px solid #b88a44;
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.06);
    }

    .section h2 {
      text-align: center;
      margin-top: 0;
      font-size: 1.5rem;
    }

    .item {
      background: white;
      border-left: 8px solid #c6a05b;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.06);
      transition: opacity 0.2s ease, transform 0.2s ease, background 0.2s ease;
    }

    .item-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .title {
      font-weight: bold;
      font-size: 1rem;
      word-break: break-word;
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
      flex-shrink: 0;
    }

    .item-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .summary-row {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .summary-text {
      padding: 10px 12px;
      background: #f3ecdf;
      border: 2px solid #cfb27a;
      border-radius: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
      flex: 1;
      min-width: 0;
    }

    .summary-link {
      background: none !important;
      border: none;
      padding: 0;
      margin-left: 4px;
      color: #7a5a34;
      font-size: 12px;
      font-weight: normal;
      text-decoration: underline;
      cursor: pointer;
      opacity: 0.65;
      transition: opacity 0.2s ease;
      box-shadow: none !important;
    }

    .summary-link:hover {
      opacity: 0.85;
      color: #7a5a34;
      background: none !important;
      transform: none !important;
      box-shadow: none !important;
    }

    .summary-editor {
      margin-top: 6px;
      display: none;
      flex-direction: column;
      gap: 6px;
      max-width: 100%;
    }

    .summary-editor.show {
      display: flex;
      width: 100%;
      box-sizing: border-box;
      align-items: flex-start;
    }

    .summary-editor textarea {
      width: 100%;
      max-width: 420px;
      min-height: 50px;
      border-radius: 10px;
      padding: 8px;
      font-size: 13px;
      box-sizing: border-box;
      align-self: flex-start;
      resize: vertical;
    }

    .item-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .summary-row {
      margin-top: 6px;
    }

    .summary-text {
      padding: 8px 10px;
      font-size: 13px;
    }

    .summary-editor.show {
      display: flex;
      width: 100%;
      box-sizing: border-box;
      align-items: flex-start;
    }

    .status-want {
      color: #7a5a34;
    }

    .status-progress {
      color: #005b96;
    }

    .status-finished {
      color: #1e6b1e;
    }

    .finished-item {
      opacity: 0.72;
      filter: grayscale(0.18);
      border-left: 8px solid #4caf50;
      background: #f3fff3;
      transform: scale(0.985);
    }

    .finished-item .title-text {
      text-decoration: line-through;
    }

    .finished-badge {
      background: #4caf50;
      color: white;
      font-size: 12px;
      font-weight: bold;
      padding: 4px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .status-want-border { border-left: 8px solid #c6a05b !important; }
    .status-progress-border { border-left: 8px solid #3498db !important; }
    .status-finished-border { border-left: 8px solid #4caf50 !important; }

    .empty {
      text-align: center;
      opacity: 0.7;
      font-style: italic;
      padding: 10px 0;
    }

    .delete-btn {
      background: #c77777;
    }

    .delete-btn:hover {
      background: #a85b5b;
    }

    @media (max-width: 700px) {
      .lists {
        grid-template-columns: 1fr;
      }

      .item-top {
        flex-direction: column;
        align-items: stretch;
      }

      .controls {
        justify-content: flex-start;
      }
    }
  
/* 🔧 Smaller item controls */
.controls select {
  padding: 6px 8px;
  font-size: 12px;
  border-radius: 8px;
}

.controls button {
  padding: 5px 8px;
  font-size: 12px;
  border-radius: 8px;
  line-height: 1;
}

.delete-btn {
  padding: 5px 8px;
  font-size: 12px;
  border-radius: 8px;
}

/* footer */

.footer {
  text-align: center;
  margin-top: 40px;
  padding: 15px;
  padding-bottom: 15px; /* extra space from bottom */
  font-size: 13px;
  opacity: 0.7;
  flex-shrink: 0;
}    
    

/* Header font styling */
.header h1, .section h2 {
  font-family: "Fredoka", cursive;
  letter-spacing: 0.5px;
}


/* Make title input longer */
#titleInput {
  width: min(600px, 100%);
}


/* raichu sitting on add box */
.raichu-wrapper {
  position: absolute;
  top: -65px;
  right: 10px;
  z-index: 10;
}

.add-box {
  position: relative;
}

.raichu-float {
  width: 85px;
  height: 85px;
}

.raichu-bubble {
  position: absolute;
  bottom: 90px;
  right: 0;
  background: #ffffff;
  color: #5e4730;
  padding: 6px 10px;
  border-radius: 12px;
  font-size: 12px;
  white-space: nowrap;
  box-shadow: 0 3px 8px rgba(0,0,0,0.2);
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  transform: translateY(6px);
  transition: opacity 0.8s ease, transform 0.8s ease, visibility 0s linear 0.8s;
}

.raichu-bubble.show,
.raichu-bubble.hover-show {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
  transition: opacity 0.2s ease, transform 0.2s ease, visibility 0s linear 0s;
}


/* Keep header on one line on mobile */
.header h1 {
  white-space: nowrap;
}

@media (max-width: 700px) {
  .header h1 {
    font-size: 1.6rem;
  }
}

  <script>
    const SUPABASE_URL = "https://ncqcqtfnaamcrbhncocv.supabase.co";
    const SUPABASE_KEY = "sb_publishable_0XjUw1Y6h99mUso6uJT_uw_dt8sFSHh";

    if (!window.supabase) {
      console.error("Supabase library failed to load.");
    }

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let movies = [];
    let games = [];
    let searchTerm = "";

    function getStatusClass(status) {
      if (status === "want to watch" || status === "want to play") return "status-want";
      if (status === "in progress" || status === "currently playing") return "status-progress";
      return "status-finished";
    }

    function isFinishedStatus(status) {
      return status === "finished";
    }

    function sortQueue(items) {
      return [...items].sort((a, b) => {
        const aFinished = isFinishedStatus(a.status) ? 1 : 0;
        const bFinished = isFinishedStatus(b.status) ? 1 : 0;

        if (aFinished !== bFinished) {
          return aFinished - bFinished;
        }

        return new Date(b.created_at) - new Date(a.created_at);
      });
    }

    function getBorderClass(status) {
      if (status === "finished") return "status-finished-border";
      if (status === "in progress" || status === "currently playing") return "status-progress-border";
      return "status-want-border";
    }

    function createItemHTML(item, index, type) {
      const options = type === "game"
        ? `
          <option value="want to play" ${item.status === "want to play" ? "selected" : ""}>want to play</option>
          <option value="currently playing" ${item.status === "currently playing" ? "selected" : ""}>currently playing</option>
          <option value="finished" ${item.status === "finished" ? "selected" : ""}>finished</option>
        `
        : `
          <option value="want to watch" ${item.status === "want to watch" ? "selected" : ""}>want to watch</option>
          <option value="in progress" ${item.status === "in progress" ? "selected" : ""}>in progress</option>
          <option value="finished" ${item.status === "finished" ? "selected" : ""}>finished</option>
        `;

      const finishedClass = item.status === "finished" ? "finished-item" : "";
      const finishedBadge = item.status === "finished"
        ? '<span class="finished-badge">Finished ✓</span>'
        : "";
      const hasSummary = item.description && item.description.trim();
      const editorValue = item.description ? escapeAttribute(item.description) : "";

      return `
        <div class="item ${finishedClass} ${getBorderClass(item.status)}">
          <div class="item-top">
            <div class="title">
              <span class="title-text">${escapeHtml(item.title)}</span>
              ${finishedBadge}
            </div>
            <div class="controls">
              <select class="${getStatusClass(item.status)}" onchange="updateStatus('${type}', ${index}, this)">
                ${options}
              </select>
              <button class="delete-btn" onclick="removeItem('${type}', ${index})">✕</button>
            </div>
          </div>

          ${hasSummary ? `
            <div class="summary-row">
              <div class="summary-text" id="${type}-summary-${index}">${escapeHtml(item.description)}</div>
              <button class="summary-link" onclick="toggleSummaryEditor('${type}', ${index})">edit summary</button>
            </div>
          ` : `
            <div class="item-actions">
              <button class="summary-link" onclick="toggleSummaryEditor('${type}', ${index})">add summary</button>
            </div>
          `}

          <div class="summary-editor" id="${type}-editor-${index}">
            <textarea id="${type}-editor-input-${index}" placeholder="write a short summary or notes here.">${editorValue}</textarea>
            <div class="item-actions">
              <button onclick="saveSummary('${type}', ${index})">save summary</button>
              <button class="secondary-btn" onclick="toggleSummaryEditor('${type}', ${index})">cancel</button>
            </div>
          </div>
        </div>
      `;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function escapeAttribute(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function filterItems(items) {
      if (!searchTerm) return items;
      return items.filter(item =>
        item.title.toLowerCase().includes(searchTerm) ||
        (item.description || "").toLowerCase().includes(searchTerm)
      );
    }

    function render() {
      const movieList = document.getElementById("movieList");
      const gameList = document.getElementById("gameList");

      const filteredMovies = filterItems(sortQueue(movies));
      const filteredGames = filterItems(sortQueue(games));

      movieList.innerHTML = filteredMovies.length
        ? filteredMovies.map((item) => createItemHTML(item, movies.findIndex(m => m.id === item.id), "movie")).join("")
        : `<div class="empty">no matching movies found ✨</div>`;

      gameList.innerHTML = filteredGames.length
        ? filteredGames.map((item) => createItemHTML(item, games.findIndex(g => g.id === item.id), "game")).join("")
        : `<div class="empty">no matching games found 🎮</div>`;
    }

    async function loadItems() {
      const { data, error } = await supabaseClient
        .from("queue_items")
        .select("*");

      if (error) {
        console.error("Load error:", error);
        return;
      }

      movies = data.filter(item => item.type === "movie");
      games = data.filter(item => item.type === "game");
      render();
    }

    async function addItem() {
      const titleInput = document.getElementById("titleInput");
      const typeInput = document.getElementById("typeInput");
      const descriptionInput = document.getElementById("descriptionInput");
      const title = titleInput.value.trim();
      const type = typeInput.value;
      const description = descriptionInput.value.trim();

      if (!title) return;

      const defaultStatus = type === "game" ? "want to play" : "want to watch";

      const { error } = await supabaseClient
        .from("queue_items")
        .insert([{ title, type, status: defaultStatus, description }]);

      if (error) {
        console.error("Insert error:", error);
        return;
      }

      titleInput.value = "";
      descriptionInput.value = "";
      document.getElementById("descriptionBox").classList.remove("show");
      document.getElementById("toggleDescriptionBtn").textContent = "add summary";
      await loadItems();
      showRaichuMessage('good choice! ⚡');
      if (status === 'finished') { showRaichuMessage('was it any good?'); }
      showRaichuMessage('good choice! ⚡');
    }

    async function updateStatus(type, index, selectElement) {
      const status = selectElement.value;
      const item = type === "movie" ? movies[index] : games[index];

      const { error } = await supabaseClient
        .from("queue_items")
        .update({ status })
        .eq("id", item.id);

      if (error) {
        console.error("Update error:", error);
        return;
      }

      selectElement.className = getStatusClass(status);
      await loadItems();

      if (status === "finished") {
        showRaichuMessage("was it any good?");
      }
    }

    async function removeItem(type, index) {
      const item = type === "movie" ? movies[index] : games[index];

      const { error } = await supabaseClient
        .from("queue_items")
        .delete()
        .eq("id", item.id);

      if (error) {
        console.error("Delete error:", error);
        return;
      }

      await loadItems();
    }

    function toggleSummaryEditor(type, index) {
      const el = document.getElementById(`${type}-editor-${index}`);
      if (!el) return;
      el.classList.toggle("show");
    }

    async function saveSummary(type, index) {
      const item = type === "movie" ? movies[index] : games[index];
      const input = document.getElementById(`${type}-editor-input-${index}`);
      const description = input.value.trim();

      const { error } = await supabaseClient
        .from("queue_items")
        .update({ description })
        .eq("id", item.id);

      if (error) {
        console.error("Summary update error:", error);
        return;
      }

      await loadItems();
    }


    

    const raichuBubble = document.getElementById('raichuBubble');
    const raichuWrapper = document.querySelector('.raichu-wrapper');
    let raichuTemporaryMessage = false;

    if (raichuWrapper && raichuBubble) {
      raichuWrapper.addEventListener('mouseenter', () => {
        if (!raichuTemporaryMessage) {
          raichuBubble.textContent = raichuBubble.dataset.default || 'hi gf 💛';
          raichuBubble.classList.add('hover-show');
        }
      });

      raichuWrapper.addEventListener('mouseleave', () => {
        if (!raichuTemporaryMessage) {
          raichuBubble.classList.remove('hover-show');
          setTimeout(() => {
            if (!raichuBubble.classList.contains('hover-show') && !raichuBubble.classList.contains('show')) {
              raichuBubble.textContent = '';
            }
          }, 800);
        }
      });
    }

    function showRaichuMessage(text) {
      const bubble = document.getElementById('raichuBubble');
      if (!bubble) return;

      raichuTemporaryMessage = true;
      bubble.classList.remove('hover-show');
      bubble.textContent = text;
      bubble.classList.add('show');

      clearTimeout(window._raichuTimer);
      clearTimeout(window._raichuCleanupTimer);

      window._raichuTimer = setTimeout(() => {
        bubble.classList.remove('show');

        window._raichuCleanupTimer = setTimeout(() => {
          bubble.textContent = '';
          raichuTemporaryMessage = false;
        }, 800);
      }, 3600);
    }

    function subscribeToChanges() {
      supabaseClient
        .channel("queue-items-live")
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "queue_items" },
          () => {
            loadItems();
          }
        )
        .subscribe();
    }

    document.getElementById("addButton").addEventListener("click", addItem);
    document.getElementById("searchInput").addEventListener("input", (event) => {
      searchTerm = event.target.value.trim().toLowerCase();
      render();
    });
    document.getElementById("toggleDescriptionBtn").addEventListener("click", () => {
      const box = document.getElementById("descriptionBox");
      box.classList.toggle("show");
      document.getElementById("toggleDescriptionBtn").textContent =
        box.classList.contains("show") ? "hide summary" : "add summary";
    });

    window.updateStatus = updateStatus;
    window.removeItem = removeItem;
    window.toggleSummaryEditor = toggleSummaryEditor;
    window.saveSummary = saveSummary;

    loadItems();
    subscribeToChanges();</script>
